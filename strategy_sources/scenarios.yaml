# ---------------------------------------------------------------------
# P7. Risk management
# ---------------------------------------------------------------------

  - id: three_loss_caps
    category: risk_psychology
    source:
      type: warrior_course_q
      reference: "Q 'A trader's set of rules should include' = all (max loss/day, max loss/trade, max consecutive losses)"
      asset: assets/image-65f2e99f-129b-45f7-9d0e-ab8340159483.png
      captured_at: 2026-06-14
    status: validated
    stimulus:
      always_matches: true
    response:
      action: no_action_informational
      reasoning: |
        Three loss caps:
          - max loss per day (HARD, enforced)
          - max loss per trade (HARD, enforced via stop + sizing)
          - max consecutive losses (TRACKED ONLY for v1.1 paper;
            decision pending on whether to enforce)
    principle_refs:
      - THREE_LOSS_CAPS
    engine_use:
      hard_rule: partial
      surface_to_user: true
      tracked_only_today:
        - consecutive_losses_count
      future_decision: |
        After paper-trading enough sample, decide:
          (a) Enforce auto-pause at N consecutive losses (paper or live).
          (b) Surface only.
